{% extends 'base.html' %}
{% block content %}
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Date Published</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ post.title }}</td>
                <td>{{ post.description }}</td>
                <td>{{ post.publish_date }}</td>
            </tr>
        </tbody>
    </table>
{% endblock %}
