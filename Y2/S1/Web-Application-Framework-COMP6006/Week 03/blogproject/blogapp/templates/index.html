{% extends 'base.html' %}
{% block content %}
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Publish Date</th>
            </tr>
        </thead>
        <tbody>
            {% for post in posts %}
            <tr>
                <td>{{ post.title }}</td>
                <td>{{ post.description }}</td>
                <td>{{ post.publish_date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
