{% extends 'base.html' %}
{% block content %}

    <div class="row mt-5">
          <div class="col-lg-12">
            <h2>All Categories...</h2>
          </div>
    </div>

    <div class="row">
        {% if categories.count > 0 %}
    	    {% for category in categories %}
                <a href="{% url 'category_events' category_id=category.id %}">
                    <div class="card bg-light mb-3 m-3" style="max-width: 20rem;">
                        <div class="card-body">
                            <h4 class="card-title">{{ category.name }}</h4>
                        </div>
                    </div>
                </a>
            {% endfor %}
        {% else %}
           <div class="col-lg-12">
           <br />
                <p>No events to show. You can submit your own events.</p>
            </div>
        {% endif %}
    </div>
{% endblock %}
