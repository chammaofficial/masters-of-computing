{% extends 'base.html' %}
{% block content %}
    <div class="row mt-5">
          <div class="col-lg-12">
            <h2>Create New Event</h2>
          </div>
    </div>
    <div class="row">
        <div class="col-lg-6">
            <form class="mb-5" method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">Create Event</button>
            </form>
        </div>
    </div>
{% endblock %}
